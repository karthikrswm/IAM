# File: docker-compose.yml
# Defines the infrastructure services (database, cache, mail catcher, message queue)
# needed for developing and running the IAM application locally using Docker Compose.
# Usage: Run 'docker-compose up -d' in the project root directory.

version: '3.8' # Use a recent Compose file version

services:
  # --- MySQL Database ---
  mysql_db:
    image: mysql:8.0 # Use a specific stable MySQL version
    container_name: iam_mysql
    restart: unless-stopped
    environment:
      # Use variables from .env file, providing defaults if .env is missing/variable not set
      MYSQL_DATABASE: iam_db
      MYSQL_USER: iam_user
      MYSQL_PASSWORD: iam_password_change_me # Sensitive - should be in .env
      MYSQL_ROOT_PASSWORD: root_password_change_me # Sensitive - should be in .env
    ports:
      # Expose MySQL port to the host machine
      - "3306:3306"
    volumes:
      # Persist MySQL data using a named volume
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Check if MySQL server is ready to accept connections
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "iam_user", "-p", "iam_password_change_me"]
      interval: 10s
      timeout: 10s # Increased timeout
      retries: 10 # Increased retries
      start_period: 30s # Allow time for initialization

  # --- Redis Cache/Session Store ---
  redis_cache:
    image: redis:7-alpine # Use a recent Redis version with a small base image
    container_name: iam_redis
    restart: unless-stopped
    ports:
      # Expose Redis port to the host machine
      - "6379:6379"
    volumes:
      # Persist Redis data using a named volume
      - redis_data:/data
    # Uncomment and set REDIS_PASSWORD in .env if password protection is needed
    # command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MailHog Email Catcher (for development) ---
  mailhog:
    image: mailhog/mailhog:latest # Use latest MailHog image
    container_name: iam_mailhog
    restart: unless-stopped
    ports:
      # Expose SMTP port (for application to send email *to*)
      - "1025:1025"
      # Expose Web UI port (for viewing caught emails)
      - "8025:8025"
    logging:
      # Configure basic log rotation for MailHog container logs
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Apache Zookeeper (Required by Kafka) ---
  zookeeper:
    image: docker.io/bitnami/zookeeper:3.8 # Use a stable Bitnami Zookeeper image
    container_name: iam_zookeeper
    restart: unless-stopped
    ports:
      # Expose Zookeeper port (primarily for Kafka connection)
      - "2181:2181"
    volumes:
      # Persist Zookeeper data
      - zookeeper_data:/bitnami/zookeeper
    environment:
      # Allow Kafka brokers to connect without authentication (simple dev setup)
      - ALLOW_ANONYMOUS_LOGIN=yes
    healthcheck:
      # Check Zookeeper server status
      test: ["CMD", "zkServer.sh", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- Apache Kafka Broker ---
  kafka:
    image: docker.io/bitnami/kafka:3.5 # Use a recent stable Bitnami Kafka image
    container_name: iam_kafka
    restart: unless-stopped
    ports:
      # Expose Kafka's EXTERNAL listener port to the host machine
      - "9092:9092"
    volumes:
      # Persist Kafka data (logs, topics)
      - kafka_data:/bitnami/kafka
    environment:
      # --- Connection to Zookeeper ---
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181 # Use service name 'zookeeper'
      # --- Listener Configuration (Crucial for connectivity) ---
      # Listener 'INTERNAL' for communication within the Docker network (e.g., app -> kafka) on port 9093
      # Listener 'EXTERNAL' for communication from outside the Docker network (e.g., host machine -> kafka) on port 9092
      KAFKA_CFG_LISTENERS: INTERNAL://:9093,EXTERNAL://:9092
      # How clients should connect based on the listener they use:
      # - INTERNAL clients connect to 'kafka:9093'
      # - EXTERNAL clients connect to 'localhost:<KAFKA_PORT>' (using the host port mapped in 'ports' section)
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      # Define the security protocol for each listener (PLAINTEXT for dev)
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # Specify which listener Kafka brokers should use for internal communication
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      # --- Security (Dev Setup) ---
      ALLOW_PLAINTEXT_LISTENER: "yes" # Allow non-SSL connections
      # --- Topic Settings ---
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true" # Auto-create topics if they don't exist (convenient for dev)
      KAFKA_CFG_NUM_PARTITIONS: 3 # Default partitions for auto-created topics
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1 # Only 1 replica as we have a single broker
      # --- Other Settings ---
      # KAFKA_CFG_MESSAGE_MAX_BYTES: 1048576 # Default 1MB
      # KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # Required for single broker
      # KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1 # Required for single broker
      # KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1 # Required for single broker
    depends_on:
      # Ensure Zookeeper is healthy before Kafka starts
      zookeeper:
        condition: service_healthy
    healthcheck:
      # Check if Kafka broker is running by trying to list topics (requires kafka-topics.sh)
      # Adjust path if using a different Kafka image
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null || exit 1"]
      interval: 30s
      timeout: 20s # Allow more time for topic listing
      retries: 10
      start_period: 60s # Allow more time for Kafka to start fully

# --- Named Volumes for Data Persistence ---
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

# Optional: Define a network if needed for specific communication setup
# networks:
#   iam_network:
#     driver: bridge
# File: src/main/resources/application.properties
# CONFIGURED FOR RUNNING iam-service LOCALLY IN IDE, connecting to Docker infrastructure.

# =========================================
# APPLICATION INFO & PROFILES
# =========================================
spring.application.name=iam-service
spring.profiles.default=dev

# =========================================
# SERVER CONFIGURATION
# =========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.whitelabel.enabled=false

# =========================================
# DATABASE CONFIGURATION (MySQL)
# =========================================
# Connect to MySQL running in Docker via localhost and exposed port
spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:iam_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:iam_user}
# !! Password MUST be provided via MYSQL_PASSWORD environment variable (e.g., set in IDE run config or system env) !!
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true # Often enabled for local dev
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# =========================================
# FLYWAY DATABASE MIGRATION
# =========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================================
# SPRING SECURITY & JWT
# =========================================
# !! JWT Secret MUST be provided via SECURITY_JWT_SECRET environment variable !!
security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=30000
security.password.encoder.strength=12

# =========================================
# ACCOUNT MANAGEMENT RULES & TOKEN EXPIRY
# =========================================
security.account.lock.max-attempts=5
security.account.lock.duration-minutes=15
security.account.credentials.expire-days=90
security.account.credentials.warn-days=14
security.account.inactivity.expire-days=180
security.verification.token.expire-minutes=1440
security.password-reset.token.expire-minutes=60

# =========================================
# OAUTH2 REDIRECT URLS
# =========================================
app.oauth2.success-redirect-url=/
app.oauth2.failure-redirect-url=/login?error

# =========================================
# REDIS CONFIGURATION (For Spring Session)
# =========================================
# Connect to Redis running in Docker via localhost and exposed port
spring.data.redis.host=localhost
spring.data.redis.port=${REDIS_PORT:6379}
# !! Password should be provided via REDIS_PASSWORD environment variable if needed !!
spring.data.redis.password=${REDIS_PASSWORD:}
spring.session.store-type=redis
spring.session.timeout=30m
spring.session.redis.namespace=iam:session

# =========================================
# KAFKA CONFIGURATION (Producer Only for iam-service)
# =========================================
# Connect to Kafka running in Docker via localhost and EXTERNALLY exposed port (9092 default)
spring.kafka.bootstrap-servers=localhost:${KAFKA_HOST_PORT:9092}
# Kafka Topic Names
kafka.topic.audit-events=iam-audit-events
# DLT topic name is not needed by producer service
# kafka.topic.audit-events-dlt=iam-audit-events.DLT
# Kafka Topic Configuration Defaults (used in iam-service's KafkaConfig bean)
kafka.topic.audit-events.partitions=3
kafka.topic.audit-events.replicas=1
# DLT Topic Config Defaults not needed by producer service
# kafka.topic.audit-events-dlt.partitions=1
# kafka.topic.audit-events-dlt.replicas=1

# --- Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Consumer Config Removed from iam-service properties ---

# =========================================
# EMAIL CONFIGURATION (e.g., using MailHog for dev)
# =========================================
# Connect to MailHog running in Docker via localhost and exposed port
spring.mail.host=localhost
spring.mail.port=${MAILHOG_SMTP_PORT:1025}

# --- Application Specific Email Settings ---
iam.support.email=noreply@example.local
# Base URL for links - Should point to where the user interacts (likely localhost for local dev)
iam.base.url=${IAM_BASE_URL:http://localhost:8080}

# =========================================
# CORS CONFIGURATION
# =========================================
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8081
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# =========================================
# LOGGING CONFIGURATION
# =========================================
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.kafka.producer=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=trace
logging.level.org.flywaydb=INFO
logging.level.org.example.iam=DEBUG

logging.level.org.springframework.session=TRACE
logging.level.org.springframework.data.redis=TRACE
logging.level.io.lettuce.core=DEBUG
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.security.authentication=TRACE
logging.level.org.springframework.security.web.authentication.session=TRACE
logging.level.org.springframework.web.filter.SessionRepositoryFilter=TRACE
logging.level.org.springframework.security.web.context=TRACE
#logging.level.org.springframework.beans.factory.support=TRACE
#logging.level.org.springframework.context.support=DEBUG
logging.level.org.springframework.security.web.csrf=TRACE

# =========================================
# SWAGGER / OPENAPI DOCUMENTATION
# =========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.enabled=true

# =========================================
# SCHEDULER CRON EXPRESSIONS & CONFIG
# =========================================
iam.scheduler.unlock.cron=0 */15 * * * *
iam.scheduler.credentials-expire.cron=0 0 0 * * *
iam.scheduler.credentials-warn.cron=0 5 1 * * *
iam.scheduler.inactivity-disable.cron=0 0 2 * * *
iam.scheduler.token-cleanup.cron=0 0 3 * * *
iam.scheduler.audit-publish.cron=0 */1 * * * *
iam.scheduler.audit-publish.batch-size=50

# =========================================
# ASYNC TASK EXECUTOR CONFIGURATION
# =========================================
async.executor.core-pool-size=5
async.executor.max-pool-size=15
async.executor.queue-capacity=50
async.executor.thread-name-prefix=Async-IAM-Exec-

# =========================================
# ENCRYPTION KEY
# =========================================
# Value comes from APP_ENCRYPTION_KEY environment variable (set in IDE Run Config)
# app.encryption.key=${APP_ENCRYPTION_KEY} # Referenced directly by @Value in AesGcmEncryptionService
# File: src/main/resources/application.properties
# Main configuration file for the IAM Service Application

# =========================================
# APPLICATION INFO & PROFILES
# =========================================
spring.application.name=iam-service
# Default profile(s) to activate if none are specified explicitly (e.g., via SPRING_PROFILES_ACTIVE)
spring.profiles.default=dev
# Example: Activate specific profiles: spring.profiles.active=dev,external-secrets

# =========================================
# SERVER CONFIGURATION
# =========================================
server.port=8080
# Configure error response details (useful for development/debugging)
server.error.include-message=always
server.error.include-binding-errors=always
# Avoid including stack traces in production responses
# Or 'never' for production
server.error.include-stacktrace=on_param
# Disable Spring Boot's default Whitelabel error page
server.error.whitelabel.enabled=false

# =========================================
# DATABASE CONFIGURATION (MySQL)
# Uses environment variables defined in .env or docker-compose.yml for credentials
# =========================================
# Ensure createDatabaseIfNotExist=true only for initial setup/dev if needed
spring.datasource.url=jdbc:mysql://localhost:3306/iam_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=iam_user
# Sensitive - Use ENV VAR
spring.datasource.password=iam_password_change_me
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================
# Use 'validate' in production to check schema against entities. Use 'update'/'create-drop' cautiously in dev.
spring.jpa.hibernate.ddl-auto=validate
# Show SQL queries in logs (set to 'true' for debugging, 'false' for production)
spring.jpa.show-sql=false
# Format SQL logs if show-sql is true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Use standard physical naming strategy (matches DB column names directly)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Disable Open Session in View pattern to prevent lazy loading issues in views/serializers
spring.jpa.open-in-view=false

# =========================================
# FLYWAY DATABASE MIGRATION
# =========================================
spring.flyway.enabled=true
# Flyway uses the main datasource credentials by default if not specified here
# spring.flyway.user=${spring.datasource.username}
# spring.flyway.password=${spring.datasource.password}
# Location of SQL migration scripts
spring.flyway.locations=classpath:db/migration

# =========================================
# SPRING SECURITY & JWT
# =========================================
# !!! JWT Secret MUST be set via Environment Variable (SECURITY_JWT_SECRET) in production !!!
# Provide a default ONLY for local development convenience - DO NOT COMMIT REAL SECRETS.
security.jwt.secret=wZ/Mf9s1rB4l+pZkCwJ8Aq7vL0Z3pDa8sCxWZqP0gN0=
# Token expiration time in milliseconds (e.g., 86400000 = 24 hours)
security.jwt.expiration-ms=86400000
# BCrypt password encoder strength (rounds). 10-12 is generally recommended. Higher is slower.
security.password.encoder.strength=12

# =========================================
# ACCOUNT MANAGEMENT RULES & TOKEN EXPIRY
# =========================================
security.account.lock.max-attempts=5
# Lock duration in minutes (0 or less disables time-based unlock)
security.account.lock.duration-minutes=15
# Password expiration in days (0 or less disables)
security.account.credentials.expire-days=90
# Disable account after inactivity in days (0 or less disables)
security.account.inactivity.expire-days=180
# Email verification token validity (24 hours)
security.verification.token.expire-minutes=1440
# Password reset token validity (1 hour)
security.password-reset.token.expire-minutes=60

# =========================================
# REDIS CONFIGURATION (For Spring Session)
# =========================================
spring.data.redis.host=redis_cache
spring.data.redis.port=6379
# spring.data.redis.password=${REDIS_PASSWORD:} # Set via ENV VAR if Redis requires password
spring.session.store-type=redis # Use Redis for session storage
# Session timeout duration (e.g., 1800s = 30 minutes)
spring.session.timeout=1800s
# Namespace for Redis keys used by Spring Session to avoid collisions
spring.session.redis.namespace=iam:session

# =========================================
# KAFKA CONFIGURATION (Producer & Consumer)
# =========================================
spring.kafka.bootstrap-servers=localhost:9092
kafka.topic.audit-events=iam-audit-events
# --- Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# spring.kafka.producer.properties.spring.json.add.type.headers=false # Configured in KafkaConfig bean

# --- Consumer ---
spring.kafka.consumer.group-id=iam-internal-audit-consumer # Unique consumer group for this service instance
# Start reading from beginning if no offset committed
spring.kafka.consumer.auto-offset-reset=earliest
# spring.kafka.consumer.enable-auto-commit=true # Configured in KafkaConfig bean
# ** SECURITY: Define trusted packages for JSON deserialization **
# Avoid "*" in production. List specific DTO packages.
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.iam.dto,java.util,java.lang

# =========================================
# EMAIL CONFIGURATION (e.g., using MailHog for dev)
# =========================================
spring.mail.host=localhost
spring.mail.port=1025
# Configure authentication if needed for a real SMTP server
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.properties.mail.smtp.starttls.enable=false

# --- Application Specific Email Settings ---
# Default sender address for application emails
iam.support.email=noreply@example.local
# Base URL used for constructing links in emails (verification, password reset)
# Should point to the frontend URL that handles these actions, or backend if API handles directly
iam.base.url=http://localhost:8080 # Adjust for different environments

# =========================================
# CORS CONFIGURATION
# =========================================
# Comma-separated list of allowed origins (e.g., frontend URLs)
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8081 # Example frontend dev ports
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
# Cache preflight response for 1 hour
cors.max-age=3600

# =========================================
# LOGGING CONFIGURATION
# =========================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
# Set to DEBUG for detailed security logs
logging.level.org.springframework.security=INFO
# Set to DEBUG/TRACE for Kafka client details
logging.level.org.springframework.kafka=INFO
# Log SQL statements (if show-sql=true)
logging.level.org.hibernate.SQL=DEBUG
# Log SQL statement parameters
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.flywaydb=INFO
# Set specific package levels for application code
# Set default for app code to DEBUG in dev
logging.level.org.example.iam=DEBUG
# Keep consumer info level unless debugging consumption
logging.level.org.example.iam.service.AuditEventConsumer=INFO
# Keep JWT utils info unless debugging token details
logging.level.org.example.iam.security.JwtUtils=INFO

# Example for logging to file:
# logging.file.name=logs/iam-service.log
# logging.file.max-size=10MB
# logging.file.max-history=7

# =========================================
# SWAGGER / OPENAPI DOCUMENTATION
# =========================================
# Path for the OpenAPI JSON spec
springdoc.api-docs.path=/v3/api-docs
# Path for the Swagger UI interface
springdoc.swagger-ui.path=/swagger-ui.html
# Show request duration in UI
springdoc.swagger-ui.display-request-duration=true
# Sort operations alphabetically
springdoc.swagger-ui.operations-sorter=alpha
# Sort tags alphabetically
springdoc.swagger-ui.tags-sorter=alpha
# Enable Swagger UI
springdoc.swagger-ui.enabled=true

# =========================================
# SCHEDULER CRON EXPRESSIONS & CONFIG
# =========================================
# Cron format: second minute hour day-of-month month day-of-week
iam.scheduler.unlock.cron=0 */15 * * * *
iam.scheduler.credentials-expire.cron=0 0 0 * * *
iam.scheduler.inactivity-disable.cron=0 0 1 * * *
iam.scheduler.token-cleanup.cron=0 0 2 * * *
iam.scheduler.audit-publish.cron=0 */5 * * * *
# Batch size for audit event publishing scheduler
iam.scheduler.audit-publish.batch-size=100
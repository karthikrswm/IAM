# File: src/main/resources/application-local.properties
# Properties for running iam-consumer LOCALLY (e.g., in IDE)
# Connects to infrastructure services running in Docker via exposed ports on localhost.

# Kafka Consumer Configuration
# Connect to Kafka running in Docker using the EXTERNALLY exposed port (default 9092)
spring.kafka.bootstrap-servers=localhost:${KAFKA_HOST_PORT:9092}

# Consumer group ID (can be the same or different for local testing)
spring.kafka.consumer.group-id=iam-audit-event-consumer-group-local

# Other consumer settings (can inherit from application.properties or be set explicitly)
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.iam.dto,java.util,java.lang

# Topic Names (can inherit from application.properties or be set explicitly if needed)
# kafka.topic.audit-events=iam-audit-events
# kafka.topic.audit-events-dlt=iam-audit-events.DLT

# Logging level for local debugging
logging.level.org.springframework.kafka=DEBUG
logging.level.org.example.iam=DEBUG
logging.level.org.apache.kafka.clients.consumer=INFO
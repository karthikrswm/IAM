# File: src/main/resources/application-docker.properties
# Properties for running iam-consumer INSIDE A DOCKER CONTAINER via docker-compose.
# Connects to infrastructure services using their Docker service names.

# Kafka Consumer Configuration
# Connect to the Kafka service using its Docker service name and INTERNAL port (default 9093)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}

# Consumer group ID (use the standard group ID for containerized deployment)
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:iam-audit-event-consumer-group}

# Other consumer settings (can inherit from application.properties or be set explicitly)
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.iam.dto,java.util,java.lang

# Topic Names (Values typically passed via environment variables from docker-compose, falling back to defaults)
kafka.topic.audit-events=${KAFKA_TOPIC_AUDIT_EVENTS:iam-audit-events}
kafka.topic.audit-events-dlt=${KAFKA_TOPIC_AUDIT_EVENTS_DLT:iam-audit-events.DLT}

# DLT Topic Config (Defaults used by KafkaConfig bean if property exists)
kafka.topic.audit-events-dlt.partitions=1
kafka.topic.audit-events-dlt.replicas=1

# Logging level suitable for container logs
logging.level.org.springframework.kafka=INFO
logging.level.org.example.iam=INFO
logging.level.org.apache.kafka.clients.consumer=WARN
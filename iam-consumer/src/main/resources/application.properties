# File: iam-consumer/src/main/resources/application.properties
# Configuration for the separate IAM Audit Event Consumer service

# Application Info
spring.application.name=iam-consumer

# Kafka Consumer Configuration (Values typically overridden by environment variables in Docker)
# These placeholders expect SPRING_KAFKA_BOOTSTRAP_SERVERS, KAFKA_TOPIC_*, etc., to be set in the container environment
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:iam-audit-event-consumer-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.iam.dto,java.util,java.lang

# Topic Names (Values typically overridden by environment variables in Docker)
kafka.topic.audit-events=${KAFKA_TOPIC_AUDIT_EVENTS:iam-audit-events}
kafka.topic.audit-events-dlt=${KAFKA_TOPIC_AUDIT_EVENTS_DLT:iam-audit-events.DLT}

# DLT Topic Config (Defaults used by KafkaConfig bean if property exists)
kafka.topic.audit-events-dlt.partitions=1
kafka.topic.audit-events-dlt.replicas=1

# Logging
logging.level.org.springframework.kafka=INFO
logging.level.org.example.iam.service.AuditEventConsumer=INFO
logging.level.org.example.iam.config.KafkaConfig=INFO
logging.level.org.apache.kafka.clients.consumer=WARN

# Optional: Actuator endpoint for health (requires adding spring-boot-starter-web and actuator to consumer pom)
# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=always
# server.port=8081 # Set a port if web server is enabled